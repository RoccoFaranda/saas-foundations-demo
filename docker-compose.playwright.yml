services:
  playwright-linux:
    build:
      context: .
      dockerfile: docker/playwright/Dockerfile
      args:
        NODE_VERSION: "24.12.0"
    working_dir: /work
    environment:
      SKIP_DOCKER_CHECK: "1"
      NEXT_DIST_DIR: ".next-e2e-linux"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/saas_foundations_test?schema=public"
      SNAPSHOT_GREP: "@visual-landing"
      SNAPSHOT_OUTPUT_PREFIX: "test-results-snapshots-linux"
      SNAPSHOT_UPDATE: "1"
    volumes:
      - ./:/work
      - playwright_node_modules:/work/node_modules
      - playwright_pnpm_store:/pnpm-store
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - >
        set -euo pipefail &&
        corepack enable &&
        corepack prepare pnpm@10.27.0 --activate &&
        pnpm config set store-dir /pnpm-store &&
        pnpm install --frozen-lockfile &&
        pnpm db:generate &&
        if [ "$${SNAPSHOT_UPDATE:-1}" = "1" ]; then pnpm exec playwright test --project=chromium --grep "$$SNAPSHOT_GREP" --update-snapshots --output="$${SNAPSHOT_OUTPUT_PREFIX}-update"; fi &&
        pnpm exec playwright test --project=chromium --grep "$$SNAPSHOT_GREP" --output="$${SNAPSHOT_OUTPUT_PREFIX}-verify"

volumes:
  playwright_node_modules:
  playwright_pnpm_store:
